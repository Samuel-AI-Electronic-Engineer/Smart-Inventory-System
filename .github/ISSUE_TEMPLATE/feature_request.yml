name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE] "
labels: ["enhancement", "feature-request"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Help us understand what you'd like to see in SmartInventoryAI.

  - type: dropdown
    id: module
    attributes:
      label: Affected Module
      description: Which part of the system would this feature affect?
      options:
        - "🔍 Vision (detection, preprocessing)"
        - "🤖 Agents (orchestration, decision-making)"
        - "📡 IoT (firmware, hardware integration)"
        - "☁️ Cloud (scalability, new services)"
        - "🗄️ Database (storage, queries)"
        - "🌐 API (endpoints, authentication)"
        - "📊 MLOps (training, evaluation)"
        - "🎨 UI/Dashboard (visualization)"
        - "📚 Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use Case / Problem Statement
      description: What problem does this feature solve? What's the user need?
      placeholder: |
        Currently, we can only detect products on shelves. We need to:
        - Classify by expiration date (OCR on labels)
        - Alert when stock reaches threshold
        - Integration with ERP system for automatic reordering
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: How should this feature work? What's your suggested approach?
      placeholder: |
        1. Add OCR model (PaddleOCR or EasyOCR) to vision pipeline
        2. Extract expiration date from labels
        3. Create AlertAgent to trigger reorders
        4. Implement REST endpoint for ERP sync
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions Considered
      description: Are there other ways to solve this?
      placeholder: |
        - Use barcode scanning instead of OCR
        - Integrate with existing inventory management system
        - Implement manual override for edge cases
    validations:
      required: false

  - type: dropdown
    id: business_impact
    attributes:
      label: Estimated Business Impact
      description: How much value would this add?
      options:
        - "🔴 Critical (blocking deployment)"
        - "🟠 High (significant improvement)"
        - "🟡 Medium (nice-to-have enhancement)"
        - "🟢 Low (minor convenience)"
    validations:
      required: true

  - type: textarea
    id: effort
    attributes:
      label: Estimated Effort
      description: How much effort would this take? (rough T-shirt size)
      placeholder: |
        - XS: 2-4 hours (simple bug fix)
        - S: 1-3 days (minor feature)
        - M: 1-2 weeks (moderate feature)
        - L: 2-4 weeks (major feature)
        - XL: 1+ month (significant system change)
    validations:
      required: false

  - type: textarea
    id: metrics
    attributes:
      label: Success Metrics
      description: How will we know this feature is successful?
      placeholder: |
        - OCR accuracy > 95% on warehouse labels
        - Reorder alerts triggered within 5 seconds of threshold
        - ERP system receives updates within 1 minute
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-Submission Checklist
      options:
        - label: "I've checked similar features don't already exist"
          required: true
        - label: "I've clearly described the use case"
          required: true
        - label: "I've provided a proposed solution"
          required: false
